<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro ONG NAIRE</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .formulario-caixa { background: white; padding: 30px; border-radius: 10px; max-width: 700px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #555; font-size: 14px; }
        
        /* Adicionada a transição suave para a borda */
        input[type="text"], input[type="date"], select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; transition: border-color 0.3s; }
        
        /* --- NOVO: Classe para a borda vermelha de erro --- */
        .erro-input { border: 2px solid #dc3545 !important; background-color: #fff8f8; }

        .linha-dupla { display: flex; gap: 10px; }
        .linha-dupla div { width: 100%; }
        
        .area-criancas { background-color: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d1d8dd; }
        .crianca-item { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .btn-adicionar { background-color: #17a2b8; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .btn-remover { background-color: #dc3545; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; height: 38px; margin-bottom: 15px;}
        
        .btn-salvar { background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .btn-salvar:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="formulario-caixa">
        <div style="text-align: center;">
            <img src="LogoInstitutoNaire02.jpeg" alt="Logo Instituto NAIRE" style="width: 350px; margin-bottom: 15px;">
        </div>
        
        <h2 id="titulo-pagina">Ficha de Cadastro - NAIRE</h2>
        
        <form id="formOng">
            <h3>Dados do Responsável</h3>
            <label>Nome da Mãe / Responsável: *</label>
            <input type="text" id="nome_mae" class="obrigatorio" placeholder="Digite o nome completo">

            <div class="linha-dupla">
                <div>
                    <label>RG:</label>
                    <input type="text" id="rg" placeholder="Apenas números">
                </div>
                <div>
                    <label>CPF: *</label>
                    <input type="text" id="cpf" class="obrigatorio" placeholder="Apenas números">
                </div>
            </div>

            <label>Endereço Completo:</label>
            <input type="text" id="endereco" placeholder="Rua, número, bairro...">

            <label>Telefones de Contato:</label>
            <input type="text" id="fones" placeholder="(11) 99999-9999">

            <hr style="margin: 30px 0;">

            <h3>Dependentes (Menores)</h3>
            <button type="button" class="btn-adicionar" onclick="adicionarCrianca()">+ Adicionar Criança</button>
            
            <div id="lista-criancas" class="area-criancas"></div>

            <button type="submit" class="btn-salvar">Salvar Ficha Completa</button>
        </form>
    </div>

    <script>
        // --- 1. VERIFICAÇÃO DE LOGIN ---
        const nomeLogado = localStorage.getItem('nomeVoluntario');
        const idVoluntarioCadastro = localStorage.getItem('idVoluntario'); 
        
        if (!nomeLogado || !idVoluntarioCadastro) {
            alert('Acesso negado. Por favor, faça login primeiro.');
            window.location.href = 'login.html';
        } else {
            const h2 = document.getElementById('titulo-pagina');
            h2.innerHTML = `Ficha de Cadastro - NAIRE <br> <span style="font-size: 14px; color: #007bff;">Logado como: ${nomeLogado}</span>`;
            // Removido o carregarVoluntarios() daqui, não precisamos mais da lista.
        }

        // --- 2. FUNÇÕES DE CRIANÇA ---
        function adicionarCrianca() {
            const lista = document.getElementById('lista-criancas');
            const idCrianca = Date.now(); 
            
            const htmlCrianca = `
                <div class="crianca-item" id="crianca-${idCrianca}">
                    <div style="flex: 3;">
                        <label>Nome Completo: *</label>
                        <input type="text" class="nome-crianca obrigatorio">
                    </div>
                    <div style="flex: 2;">
                        <label>Nascimento: *</label>
                        <input type="date" class="data-crianca obrigatorio">
                    </div>
                    <div style="flex: 1;">
                        <label>Roupa:</label>
                        <input type="text" class="roupa-crianca" placeholder="Ex: 10">
                    </div>
                    <div style="flex: 1;">
                        <label>Sapato:</label>
                        <input type="text" class="sapato-crianca" placeholder="Ex: 32">
                    </div>
                    <button type="button" class="btn-remover" onclick="removerCrianca(${idCrianca})">X</button>
                </div>
            `;
            lista.insertAdjacentHTML('beforeend', htmlCrianca);
        }

        function removerCrianca(id) {
            document.getElementById(`crianca-${id}`).remove();
        }

        // --- NOVO: 3. FUNÇÃO DE VALIDAÇÃO VISUAL ---
        function validarFormulario() {
            let formValido = true;
            let primeiroCampoComErro = null;

            // Busca todos os campos que têm a classe 'obrigatorio'
            const camposObrigatorios = document.querySelectorAll('.obrigatorio');

            camposObrigatorios.forEach(campo => {
                // Limpa a borda vermelha se o usuário tiver preenchido
                campo.classList.remove('erro-input');

                // Se estiver vazio, pinta de vermelho
                if (campo.value.trim() === '') {
                    campo.classList.add('erro-input');
                    formValido = false;
                    
                    // Guarda o primeiro campo vazio para rolar a tela até ele
                    if (!primeiroCampoComErro) {
                        primeiroCampoComErro = campo;
                    }
                }
            });

            if (!formValido) {
                // Rola a tela até o erro e dá o alerta
                primeiroCampoComErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                primeiroCampoComErro.focus();
                alert('⚠️ Por favor, preencha os campos obrigatórios destacados em vermelho.');
            }

            return formValido;
        }

        // --- 4. CÉREBRO: ENVIO DO FORMULÁRIO ---
        document.getElementById('formOng').addEventListener('submit', async function(evento) {
            evento.preventDefault();

            // CHAMA A VALIDAÇÃO AQUI. Se retornar false, o código para e não envia pro Node.
            if (!validarFormulario()) {
                return; 
            }

            const dadosResponsavel = {
                nome_mae: document.getElementById('nome_mae').value,
                rg: document.getElementById('rg').value,
                cpf: document.getElementById('cpf').value,
                endereco: document.getElementById('endereco').value,
                fones: document.getElementById('fones').value
            };

            const listaHTML = document.querySelectorAll('.crianca-item');
            const dadosMenores = [];
            
            listaHTML.forEach(item => {
                dadosMenores.push({
                    nome: item.querySelector('.nome-crianca').value,
                    data: item.querySelector('.data-crianca').value,
                    roupa: item.querySelector('.roupa-crianca').value,
                    sapato: item.querySelector('.sapato-crianca').value
                });
            });

            const pacoteFinal = {
                responsavel: dadosResponsavel,
                menores: dadosMenores,
                voluntario_cadastro_id: idVoluntarioCadastro, 
                voluntario_responsavel_id: null // Agora enviamos NULL direto, o Admin preenche depois!
            };

            try {
                const resposta = await fetch('http://localhost:3000/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pacoteFinal)
                });

                if (resposta.ok) {
                    alert('🎉 Ficha completa da ONG cadastrada com sucesso!');
                    document.getElementById('formOng').reset();
                    document.getElementById('lista-criancas').innerHTML = ''; 
                    
                    // Remove qualquer borda vermelha que tenha ficado após salvar com sucesso
                    document.querySelectorAll('.obrigatorio').forEach(c => c.classList.remove('erro-input'));
                } else {
                    alert('Ops! Erro ao salvar. Verifique o console do Node.');
                }
            } catch (erro) {
                alert('Erro de conexão. Servidor está ligado?');
            }
        });
    </script>
</body>
</html>
