<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG NAIRE - Início</title>
    <style>
        /* Fundo clarinho igual da imagem e tela centralizada */
        body { 
            font-family: Arial, sans-serif; 
            background-color: lab(100% 0.01 -0.01);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        
        /* O Logo gigante no topo */
        .logo-ong { width: 400px; max-width: 90%; margin-bottom: 35px; }
        
        /* O texto de boas vindas */
        .mensagem { font-size: 22px; color: #333; margin-bottom: 35px; }
        
        /* Estilo base dos dois botões (arredondados) */
        .btn { 
            display: block; 
            width: 380px; 
            max-width: 90%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: none; 
            border-radius: 30px; /* Deixa o botão redondo nas pontas */
            font-size: 18px; 
            text-decoration: none; /* Tira o sublinhado do link */
            color: white; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        
        /* Cor específica do botão azul */
        .btn-azul { background-color: #6b93c7; }
        .btn-azul:hover { background-color: #557ba8; }
        
        /* Cor específica do botão verde do colaborador */
        .btn-verde { background-color: #529b55; font-weight: bold; }
        .btn-verde:hover { background-color: #3e7a40; }
        
        /* A linhazinha de rodapé */
        .rodape { 
            margin-top: 60px; 
            font-size: 12px; 
            color: #777; 
            border-top: 1px solid #d1d8dd; 
            padding-top: 20px; 
            width: 300px; 
        }
    </style>
</head>
<body>

    <img src="LogoInstitutoNaire02.jpeg" alt="Logo ONG NAIRE" class="logo-ong">
        
    <div class="mensagem">Bem-vindo. Venha conhecer nosso trabalho.</div>

    <a href="#" class="btn btn-azul" onclick="alert('Esta página de projetos será construída no futuro!')">
        Conhecer Projetos e Atuação
    </a>
    
    <a href="login.html" class="btn btn-verde">
        🔑 ** Acessar Portal do Colaborador **
    </a>

    <div class="rodape">
        @ 2026 Instituto NAIRE<br>
        Acesso exclusivo para equipe da ONG
    </div>

</body>
</html>
